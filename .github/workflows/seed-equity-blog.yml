name: Seed — equity-research-blog Backfill

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run (DB 쓰기 없이 예상 결과만 출력)"
        required: false
        default: "true"
        type: boolean
      no_fetch:
        description: "원문 body fetch 생략 (summary_ko만 사용, 빠름)"
        required: false
        default: "false"
        type: boolean

jobs:
  seed:
    name: Seed equity-research-blog articles
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run seed import
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_fetch }}" = "true" ]; then
            ARGS="$ARGS --no-fetch"
          fi
          python3 ingestion/seed_equity_blog.py $ARGS
