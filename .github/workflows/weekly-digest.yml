name: Weekly Wiki + Digest

on:
  schedule:
    - cron: "0 22 * * 0"  # 일요일 22:00 UTC = 월요일 07:00 KST
  workflow_dispatch:
    inputs:
      sector:
        description: "섹터 (all / ai_dc / power / semi / aisw / pm — configs/taxonomy.yaml 참조)"
        required: false
        default: "all"

jobs:
  wiki-digest:
    name: Generate wiki + weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # kb/wiki/*.md 커밋용

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Generate wiki (force)
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
        run: |
          SECTOR="${{ github.event.inputs.sector || 'all' }}"
          python3 knowledge/generate_wiki.py --sector "$SECTOR" --force

      - name: Generate weekly digest
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          python3 knowledge/weekly_digest.py

      # ── 트렌드 스코어링 + 이상 징후 감지 ─────────────────────────────────
      # 순서 고정: scoring(trend_scores 계산) → anomaly(그 결과로 판정) → report(합성)
      - name: Compute mention/importance scores
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: python3 knowledge/scoring.py --period weekly

      - name: Detect anomalies
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: python3 knowledge/anomaly.py --period weekly

      - name: Generate trend memory report
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: python3 knowledge/trend_report.py --period weekly

      - name: Commit wiki updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kb/wiki/
          if git diff --cached --quiet; then
            echo "wiki 변경 없음"
          else
            git commit -m "chore(wiki): auto-update sector wikis [skip ci]"
            git push
          fi

      - name: Upload weekly digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-${{ github.run_id }}
          path: |
            output/weekly-*.md
            output/trend-report-*.md
          if-no-files-found: ignore
          retention-days: 90
