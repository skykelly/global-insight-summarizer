name: Daily Ingest

on:
  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC = 09:00 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run (저장 없이 경로만 출력)"
        required: false
        default: "false"
        type: boolean
      source_id:
        description: "특정 소스 ID (비우면 전체)"
        required: false
        default: ""
      tier:
        description: "특정 tier (비우면 전체)"
        required: false
        default: ""

jobs:
  ingest:
    name: Run ingestion pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run router
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          BLOB_READ_WRITE_TOKEN:  ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.source_id }}" ]; then
            ARGS="$ARGS --source ${{ github.event.inputs.source_id }}"
          fi
          if [ -n "${{ github.event.inputs.tier }}" ]; then
            ARGS="$ARGS --tier ${{ github.event.inputs.tier }}"
          fi
          python ingestion/router.py $ARGS

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-log-${{ github.run_id }}
          path: /tmp/ingest-*.log
          if-no-files-found: ignore
          retention-days: 7
