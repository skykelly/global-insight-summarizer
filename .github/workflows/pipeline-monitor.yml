name: R1 — Pipeline Monitor

on:
  workflow_run:
    workflows: ["Daily Ingest"]
    types: [completed]

jobs:
  diagnose:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get failed run logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          # 실패 로그 수집
          gh run view "$RUN_ID" --log-failed --repo "$GITHUB_REPOSITORY" \
            > /tmp/failed_log.txt 2>&1 || true
          head -200 /tmp/failed_log.txt > /tmp/log_snippet.txt

          # 원인 분류
          LOG=$(cat /tmp/log_snippet.txt)
          if echo "$LOG" | grep -qiE "ParseError|NoSuchElement|AttributeError|empty result|selector"; then
            echo "cause=scraper_broken" >> "$GITHUB_OUTPUT"
          elif echo "$LOG" | grep -qiE "403|429|ConnectionRefused|timeout|ip.block"; then
            echo "cause=ip_blocked" >> "$GITHUB_OUTPUT"
          elif echo "$LOG" | grep -qiE "rate.limit|quota|RateLimitError|insufficient_quota"; then
            echo "cause=api_limit" >> "$GITHUB_OUTPUT"
          elif echo "$LOG" | grep -qiE "psycopg|neon|pg.*connect|FATAL.*database"; then
            echo "cause=db_error" >> "$GITHUB_OUTPUT"
          else
            echo "cause=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Create diagnostic issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CAUSE="${{ steps.logs.outputs.cause }}"
          RUN_ID="${{ steps.logs.outputs.run_id }}"
          DATE=$(date -u +"%Y-%m-%d")
          LOG_SNIPPET=$(head -100 /tmp/log_snippet.txt | sed 's/`/\`/g')

          BODY="## R1 파이프라인 진단 — ${DATE}

          **원인 분류**: \`${CAUSE}\`
          **실패 실행**: [Run #${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})

          ### 로그 (상위 100줄)
          \`\`\`
          ${LOG_SNIPPET}
          \`\`\`

          ### 권고 조치
          $(case "$CAUSE" in
            scraper_broken) echo "- ingestion/channels/ 파서 확인 및 수정 필요\n- Claude Routine R1(세션 활성 시)이 자동 수리 시도";;
            ip_blocked)     echo "- sources.yaml 해당 소스에 fallback: firecrawl 추가 검토\n- Claude Routine R1(세션 활성 시)이 PR 제안";;
            api_limit)      echo "- OpenAI API 할당량 확인\n- 필요 시 ingest 일시 중단 (daily-ingest.yml skip_knowledge: true)";;
            db_error)       echo "- Neon 대시보드에서 연결 상태 확인\n- DATABASE_URL 시크릿 유효성 확인";;
            *)              echo "- 로그 직접 확인 필요";;
          esac)

          ---
          _R1 자동 진단 — 자가 수리는 Claude Routine R1(세션 활성 중)이 담당_"

          gh issue create \
            --title "[R1 진단] ${DATE} 파이프라인 실패 — ${CAUSE}" \
            --body "$BODY" \
            --label "bug,automation" \
            --repo "$GITHUB_REPOSITORY" || true
